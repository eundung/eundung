<!DOCTYPE html>
<html>
<head>
    <title>노래책</title>
</head>
<body>
    <h1>노래책</h1>
</body>
</html>
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f8b6cf">
  <title>은교의 노래책 · 신청하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#47344d;--muted:#8e778f;--cream:#fffaf4;--paper:#fffefd;--pink:#f584ad;--pink2:#ffe2ec;--lav:#a799ed;--line:#f0dbe5;--mint:#75cdb6;--shadow:0 16px 36px rgba(133,81,112,.13)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 8% 3%,#fff 0 6%,transparent 7%),linear-gradient(145deg,#fff5f8,#f7f0ff);font-family:'Gowun Dodum',sans-serif;color:var(--ink)}
    .app{width:min(100%,540px);margin:auto;padding:20px 16px 48px}.hero{position:relative;overflow:hidden;padding:25px 22px 22px;border:1px solid rgba(255,255,255,.9);border-radius:28px;background:linear-gradient(135deg,#ffc5d8,#d8ceff);box-shadow:var(--shadow)}
    .hero:after{content:'♫';position:absolute;right:18px;top:-16px;font:86px 'Jua';color:#fff8;transform:rotate(-12deg)}.eyebrow{position:relative;z-index:1;margin:0 0 8px;font-size:12px;letter-spacing:.08em;color:#7b5273}.hero h1{position:relative;z-index:1;margin:0;font:30px 'Jua';letter-spacing:-.5px}.hero p{position:relative;z-index:1;margin:7px 0 0;font-size:13px;color:#654e63}
    .notice{display:flex;gap:9px;margin:14px 2px 20px;padding:12px 14px;border-radius:16px;background:#fff9d9;color:#75613a;font-size:12px;line-height:1.55}.notice[hidden]{display:none}.section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 3px 10px;font:18px 'Jua'}.pill{padding:4px 9px;border-radius:99px;background:var(--pink2);font:12px 'Gowun Dodum';color:#a65275}
    .name-card,.search,.song,.request{background:var(--paper);border:1px solid #fff;box-shadow:0 7px 20px rgba(111,79,98,.07)}.name-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border-radius:18px;font-size:13px}.name-card b{font-family:'Jua';font-size:15px}.link-btn{border:0;background:none;color:#a75d9d;font:13px 'Jua';cursor:pointer}.search{position:relative;display:flex;align-items:center;justify-content:flex-start;padding:4px 4px 4px 14px;border-radius:16px;max-width:320px;margin:0 auto}.search span{font-size:13px;opacity:.6;line-height:1;flex:0 0 auto;margin-right:3px}.search input{flex:1 1 auto;padding:11px 4px;border:0;outline:0;background:transparent;font:14px 'Gowun Dodum';color:var(--ink);text-align:left}
    #songs{display:grid;gap:10px}.song{display:flex;align-items:center;gap:11px;padding:12px;border-radius:18px}.music{display:grid;place-items:center;flex:0 0 42px;width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg,#ffe3ec,#e8e3ff);font-size:20px}.song-info{min-width:0;flex:1}.song-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:bold;font-size:14px}.artist{margin-top:3px;color:var(--muted);font-size:11px}.request-btn,.copy-btn{flex:0 0 auto;border:0;border-radius:99px;padding:9px 12px;background:var(--ink);color:#fff;font:13px 'Jua';cursor:pointer;transition:.15s}.request-btn:hover,.copy-btn:hover{transform:translateY(-1px);background:#664d71}.genre-tag{display:inline-block;margin-left:6px;padding:1px 8px;border-radius:99px;background:var(--pink2);color:#a65275;font-size:10px}.genre-filter{display:flex;gap:6px;flex-wrap:wrap;margin:10px 2px 0}.genre-btn{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:99px;padding:6px 12px;font:12px 'Gowun Dodum';cursor:pointer}.genre-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}.sort-filter{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin:8px 2px 0}.sort-btn{border:0;background:none;color:var(--muted);border-radius:99px;padding:3px 6px;font:12px 'Gowun Dodum';line-height:1;cursor:pointer}.sort-btn.active{color:var(--ink);font-weight:bold;text-decoration:underline;text-underline-offset:3px}.sort-btn:not(.active):hover{color:var(--ink)}.empty{padding:28px 12px;border-radius:18px;text-align:center;background:#fff9fb;color:var(--muted);font-size:13px}.empty strong{display:block;margin-bottom:6px;font:18px 'Jua';color:#b287a0}
    dialog{width:min(calc(100% - 32px),380px);border:0;border-radius:24px;padding:0;background:#fffdfd;box-shadow:0 20px 60px #45243a55}dialog::backdrop{background:#44304466}.modal{padding:24px}.modal h2{margin:0 0 7px;font:21px 'Jua'}.modal p{margin:0 0 15px;color:var(--muted);font-size:13px;line-height:1.6}.modal input{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;outline:0;font:14px 'Gowun Dodum'}.modal-actions{display:flex;gap:8px;margin-top:14px}.modal-actions button{flex:1;border:0;border-radius:12px;padding:11px;font:14px 'Jua';cursor:pointer}.cancel{background:#f4edf2;color:#826e7e}.confirm{background:var(--pink);color:#fff}.toast{position:fixed;left:50%;bottom:24px;z-index:4;transform:translate(-50%,20px);opacity:0;padding:11px 17px;border-radius:99px;background:#47344df0;color:#fff;font:13px 'Jua';pointer-events:none;transition:.2s}.toast.show{transform:translate(-50%,0);opacity:1}
  </style>
</head>
<body>
  <main class="app">
    <header class="hero"><p class="eyebrow">SPOON RADIO SONGBOOK</p><h1>은교의 노래책</h1><p>듣고 싶은 곡은 편지함으로 신청해주세요.</p></header>
    <div class="notice" id="setupNotice" hidden>⚙️ <span>아직 실시간 연결 설정이 되지 않았어요. 관리자에게 설정을 요청해 주세요.</span></div>
    <section aria-label="노래 목록"><div class="section-title"><span class="pill" id="songCount">0곡</span></div><label class="search"><span>🔎</span><input id="search" type="search" autocomplete="off" size="10" placeholder="제목or가수"></label><div class="genre-filter" id="genreFilter"></div><div class="sort-filter" id="sortFilter"></div><div id="songs" style="margin-top:10px"></div></section>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    // 설정안내.md의 값으로 바꾸면 모든 시청자와 실시간으로 연결됩니다.
    const SUPABASE_URL = 'https://bxceghrdlmkiyoigycwb.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pJdG6nCDAkOa2QoNxao3RQ_vUcfoQ1S';
    const configured = !SUPABASE_URL.startsWith('YOUR_') && !SUPABASE_ANON_KEY.startsWith('YOUR_');
    const supabase = configured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
    const $ = s => document.querySelector(s); let songs=[]; let genreList=[]; let currentGenre='전체'; let currentSort='latest';
    const toast = message => { const el=$('#toast'); el.textContent=message; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1900); };
    function el(tag,className,text){const x=document.createElement(tag);if(className)x.className=className;if(text!==undefined)x.textContent=text;return x;}
    function songGenres(s){return (s.genres&&s.genres.length)?s.genres:(s.genre?[s.genre]:[]);}
    function renderSortFilter(){const box=$('#sortFilter');const opts=[['latest','최신순'],['alpha','가나다순']];box.replaceChildren();opts.forEach(([key,label])=>{const b=el('button','sort-btn'+(key===currentSort?' active':''),label);b.type='button';b.onclick=()=>{currentSort=key;renderSortFilter();renderSongs();};box.append(b);});}
    function renderGenreFilter(){const box=$('#genreFilter');box.style.display='flex';const all=['전체',...genreList.map(g=>g.name)];box.replaceChildren();all.forEach(g=>{const b=el('button','genre-btn'+(g===currentGenre?' active':''),g);b.type='button';b.onclick=()=>{currentGenre=g;renderGenreFilter();renderSongs();};box.append(b);});}
    function renderSongs(){const box=$('#songs'),q=$('#search').value.trim().toLowerCase(),shown=songs.filter(s=>{const gs=songGenres(s);return (s.title+s.artist).toLowerCase().includes(q)&&(currentGenre==='전체'||gs.includes(currentGenre));});shown.sort((a,b)=>currentSort==='alpha'?a.title.localeCompare(b.title,'ko'):new Date(b.created_at)-new Date(a.created_at));box.replaceChildren();$('#songCount').textContent=songs.length+'곡';if(!shown.length){const e=el('div','empty');e.innerHTML='<strong>🎶 '+(songs.length?'찾는 노래가 없어요':'아직 등록된 노래가 없어요')+'</strong>다른 검색어로 찾아보세요.';box.append(e);return;} shown.forEach(s=>{const gs=songGenres(s);const card=el('article','song'),icon=el('div','music',gs.includes('피아노연주곡')?'🎹':'🎵'),info=el('div','song-info'),title=el('div','song-title',s.title),artist=el('div','artist'),button=el('button','copy-btn','복사하기');artist.textContent=s.artist||'가수 미입력';gs.forEach(g=>{const tag=el('span','genre-tag',g);artist.append(tag);});button.type='button';button.onclick=()=>copySong(s);info.append(title,artist);card.append(icon,info,button);box.append(card);});}
    async function copySong(song){const text=song.title+(song.artist?' - '+song.artist:'');try{await navigator.clipboard.writeText(text);toast('복사했어요 📋');}catch(err){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.append(ta);ta.select();try{document.execCommand('copy');toast('복사했어요 📋');}catch(e){toast('복사에 실패했어요');}ta.remove();}}
    function render(){renderSortFilter();renderGenreFilter();renderSongs();}
    async function loadGenres(){const {data,error}=await supabase.from('genres').select('*').order('sort_order');if(!error)genreList=data||[];}
    async function load(){if(!configured){$('#setupNotice').hidden=false;render();return;}await loadGenres();const {data,error}=await supabase.from('songs').select('*').order('created_at');if(error){toast('데이터를 불러오지 못했어요');return;}songs=data;render();}
    $('#search').addEventListener('input',renderSongs);
    load();if(configured){supabase.channel('songbook-live').on('postgres_changes',{event:'*',schema:'public',table:'songs'},load).subscribe();supabase.channel('songbook-genres-live').on('postgres_changes',{event:'*',schema:'public',table:'genres'},load).subscribe();}
  </script>
</body>
</html>
